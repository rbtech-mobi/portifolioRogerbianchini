yaml
name: Update Portfolio
on:
  schedule:
    - cron: '0 12 * * 1'   # toda segunda, 9h Curitiba (UTC-3)
  workflow_dispatch:         # botão manual no GitHub
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run update script
        run: python _scripts/update.py
      - name: Commit and push if changed
        run: |
          git config user.name "portfolio-bot"
          git config user.email "bot@rbtech.mobi"
          git add -A
          git diff --staged --quiet || git commit -m "auto: update $(date +'%Y-%m-%d')"
          git push
